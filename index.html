<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Catering</title>
</head>

<body>
    <nav id="nav-container">
        <h1>Catering</h1>
        <img src="assets/filter_icon.png" alt="Filter icon">
    </nav>

    <!-- Webbsidans huvudinnehåll -->
    <main id="main-content">

        <!-- Första container: Sökfältet + pills  -->
        <div id="search-container">
            <form id="search-form">
                <label for="search-textarea"></label>
                <textarea id="search-textarea" name="search"></textarea>
            </form>
        </div>

        <!-- Andra container: Filter -->
        <div id="filter-container">

        </div>


        <!-- Tredje container: Antal recept och Sortering (alfabetisk + relevans) -->
        <div id="sorting-container">

        </div>


        <!-- Fjärde container: Recept som matchar sökfiltret -->
        <div id="recipe-container">

        </div>



    </main>

</body>

</html>
